<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnkLeet</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="reviews">Reviews</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <div id="tab-dashboard" class="tab-panel active">
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-retention">&mdash;</span>
        <span class="stat-label">Retention</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-reviews">&mdash;</span>
        <span class="stat-label">Reviews</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-streak">&mdash;</span>
        <span class="stat-label">Streak</span>
      </div>
    </div>
    <div class="activity-grid-section">
      <div class="activity-grid-header">
        <span class="activity-grid-title">Last 14 Days</span>
        <span class="activity-grid-total" id="grid-total"></span>
      </div>
      <div class="activity-grid" id="activity-grid"></div>
      <div class="activity-grid-labels" id="grid-labels"></div>
      <div class="activity-grid-legend">
        <span class="legend-label">Less</span>
        <span class="legend-cell" data-level="0"></span>
        <span class="legend-cell" data-level="1"></span>
        <span class="legend-cell" data-level="2"></span>
        <span class="legend-cell" data-level="3"></span>
        <span class="legend-cell" data-level="4"></span>
        <span class="legend-label">More</span>
      </div>
    </div>
    <div class="section-header">Today's Activity</div>
    <div id="activity-list" class="activity-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <div id="tab-reviews" class="tab-panel">
    <div class="reviews-header">
      <span id="review-count" class="reviews-due-label">Loading...</span>
    </div>
    <div id="review-list" class="review-list"></div>
    <div id="review-empty" class="empty-state" style="display:none;">All caught up!</div>
  </div>

  <div id="tab-settings" class="tab-panel">
    <div class="settings-panel">
      <div class="settings-title">Settings</div>

      <div class="form-group">
        <label class="form-label" for="api-key">OpenRouter API Key</label>
        <input type="password" id="api-key" class="form-input" placeholder="sk-or-...">
      </div>

      <div class="form-group">
        <label class="form-label" for="ai-model">AI Model</label>
        <select id="ai-model" class="form-input">
          <option value="anthropic/claude-haiku-4.5">Claude Haiku 4.5 (fast, cheap)</option>
          <option value="anthropic/claude-sonnet-4">Claude Sonnet 4 (balanced)</option>
          <option value="google/gemini-2.5-flash">Gemini 2.5 Flash (fast, cheap)</option>
          <option value="openai/gpt-4o-mini">GPT-4o Mini (fast, cheap)</option>
          <option value="openai/gpt-4o">GPT-4o (balanced)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Notifications</label>
        <label class="checkbox-label">
          <input type="checkbox" id="notif-enabled">
          Enable review reminders
        </label>
      </div>

      <div class="form-group">
        <label class="form-label" for="notif-time">Reminder Time</label>
        <input type="time" id="notif-time" class="form-input" value="09:00">
      </div>

      <button id="save-settings" class="save-btn">Save Settings</button>
      <span id="save-status" class="save-status"></span>

      <div class="data-section">
        <div class="data-section-title">Data Transfer</div>
        <p class="data-section-desc">Export your data to transfer between browsers. Includes problem history, review schedule, and conversations.</p>
        <div class="data-buttons">
          <button id="export-data" class="data-btn export-btn">Export Data</button>
          <button id="import-data" class="data-btn import-btn">Import Data</button>
        </div>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <span id="data-status" class="save-status"></span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
